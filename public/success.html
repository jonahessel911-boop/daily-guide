<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/meta-pixel.js"></script>
  <script src="/meta-track.js"></script>
  <title>Bedankt! | 1970cam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/checkout.css">
  <link rel="stylesheet" href="/legal/legal.css">
  <link rel="stylesheet" href="/1970cam-brand.css">
</head>
<body class="checkout-page success-page" data-track-product="1970cam">
  <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=1545607877104793&amp;ev=PageView&amp;noscript=1" alt="" /></noscript>
  <div class="success-card">
    <div class="success-icon">✓</div>
    <h1>Bedankt voor je bestelling!</h1>
    <p id="success-message">Je betaling is gelukt. Je ontvangt een bevestiging per e-mail en we gaan je 1970cam zo snel mogelijk verzenden.</p>
    <a href="/" class="btn-primary" style="max-width:100%">Terug naar home</a>
  </div>

  <footer class="legal-footer legal-footer--compact">
    <nav class="legal-footer__links">
      <a href="/legal/algemene-voorwaarden.html">Algemene voorwaarden</a>
      <a href="/legal/privacybeleid.html">Privacybeleid</a>
      <a href="/legal/verzending.html">Verzending</a>
      <a href="/legal/retourbeleid.html">Retourbeleid</a>
    </nav>
  </footer>

  <script src="/api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const paymentIntent = params.get('payment_intent');
    const sessionId = params.get('session_id');

    function trackMetaPurchase(paymentId, amount) {
      const key = `meta_purchase_${paymentId}`;
      if (!paymentId || sessionStorage.getItem(key)) return;
      if (window.MetaPixel?.trackPurchase(amount, paymentId)) {
        sessionStorage.setItem(key, '1');
      }
    }

    function showSuccess(data) {
      if (data.status !== 'succeeded' && data.status !== 'paid') return;
      const amount = `€${data.amount.toFixed(2).replace('.', ',')}`;
      const email = data.email || 'je e-mailadres';
      document.getElementById('success-message').textContent =
        `Je betaling van ${amount} is gelukt! Bevestiging gaat naar ${email}. Je 1970cam wordt zo snel mogelijk verzonden.`;
      trackMetaPurchase(sessionId || paymentIntent, data.amount);
    }

    if (sessionId) {
      Api.apiFetch(`/api/checkout-status?session_id=${encodeURIComponent(sessionId)}`)
        .then(({ data }) => showSuccess({ ...data, status: data.status === 'paid' ? 'paid' : data.status }))
        .catch(() => {});
    } else if (paymentIntent) {
      Api.apiFetch(`/api/payment-status?payment_intent=${encodeURIComponent(paymentIntent)}`)
        .then(({ data }) => showSuccess({ ...data, status: data.status }))
        .catch(() => {});
    }
  </script>
</body>
</html>
